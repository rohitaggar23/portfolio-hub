<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="460" viewBox="0 0 1100 460" role="img" aria-labelledby="title desc">
<title id="title">Restaurant recommender architecture</title>
<desc id="desc">Architecture for a hybrid recommender system with multiple ranking signals.</desc>
<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#16a34a"/><stop offset="1" stop-color="#2563eb"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.22"/></filter></defs>
<rect width="1100" height="460" rx="26" fill="#fbfbfb"/>
<text x="45" y="70" font-family="Inter,Segoe UI,Arial" font-size="32" font-weight="800" fill="#0f172a">Restaurant Hybrid Recommender: ranking pipeline</text>
<text x="45" y="104" font-family="Inter,Segoe UI,Arial" font-size="17" fill="#475569">Candidate generation and ranking using content, collaborative, popularity, graph, and distance signals.</text>
<g font-family="Inter,Segoe UI,Arial" filter="url(#s)">
 <rect x="45" y="160" width="155" height="110" rx="18" fill="#ffffff" stroke="#d1d5db"/><text x="73" y="200" font-size="18" font-weight="800" fill="#0f172a">Data</text><text x="73" y="232" font-size="14" fill="#475569">users + reviews</text>
 <rect x="245" y="130" width="170" height="80" rx="18" fill="#ffffff" stroke="#d1d5db"/><text x="273" y="165" font-size="17" font-weight="800" fill="#0f172a">Content</text><text x="273" y="190" font-size="13" fill="#475569">TF-IDF similarity</text>
 <rect x="245" y="230" width="170" height="80" rx="18" fill="#ffffff" stroke="#d1d5db"/><text x="273" y="265" font-size="17" font-weight="800" fill="#0f172a">Collaborative</text><text x="273" y="290" font-size="13" fill="#475569">user-item signal</text>
 <rect x="465" y="130" width="170" height="80" rx="18" fill="#ffffff" stroke="#d1d5db"/><text x="493" y="165" font-size="17" font-weight="800" fill="#0f172a">Popularity</text><text x="493" y="190" font-size="13" fill="#475569">ratings + count</text>
 <rect x="465" y="230" width="170" height="80" rx="18" fill="#ffffff" stroke="#d1d5db"/><text x="493" y="265" font-size="17" font-weight="800" fill="#0f172a">Location</text><text x="493" y="290" font-size="13" fill="#475569">distance-aware</text>
 <rect x="685" y="160" width="170" height="110" rx="18" fill="#ffffff" stroke="#d1d5db"/><text x="715" y="202" font-size="18" font-weight="800" fill="#0f172a">Hybrid Ranker</text><text x="715" y="235" font-size="14" fill="#475569">weighted fusion</text>
 <rect x="905" y="160" width="155" height="110" rx="18" fill="#ffffff" stroke="#d1d5db"/><text x="936" y="202" font-size="18" font-weight="800" fill="#0f172a">Outputs</text><text x="936" y="232" font-size="14" fill="#475569">ranked recs</text>
</g>
<g stroke="url(#g)" stroke-width="5" fill="none" stroke-linecap="round"><path d="M200 215H245"/><path d="M415 170H465"/><path d="M415 270H465"/><path d="M635 170C665 170 665 215 685 215"/><path d="M635 270C665 270 665 215 685 215"/><path d="M855 215H905"/></g>
<g font-family="Inter,Segoe UI,Arial" font-size="15" fill="#334155">
 <rect x="150" y="350" width="220" height="48" rx="16" fill="#dcfce7"/><text x="184" y="380">Top-K recommendation</text>
 <rect x="405" y="350" width="220" height="48" rx="16" fill="#dbeafe"/><text x="455" y="380">Cold start flow</text>
 <rect x="660" y="350" width="220" height="48" rx="16" fill="#fef3c7"/><text x="711" y="380">Offline metrics</text>
</g>
</svg>