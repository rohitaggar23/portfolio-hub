<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
<title id="title">AI ML portfolio system map</title>
<desc id="desc">A visual map showing notebook prototypes converted into tested AI/ML systems.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0f172a"/>
    <stop offset="0.55" stop-color="#111827"/>
    <stop offset="1" stop-color="#1e1b4b"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#38bdf8"/>
    <stop offset="1" stop-color="#a78bfa"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
</defs>
<rect width="1280" height="560" rx="30" fill="url(#bg)"/>
<circle cx="1110" cy="90" r="150" fill="#38bdf8" opacity="0.10"/>
<circle cx="170" cy="470" r="190" fill="#a78bfa" opacity="0.12"/>
<text x="70" y="92" font-family="Inter,Segoe UI,Arial" font-size="38" font-weight="800" fill="#f8fafc">AI/ML Portfolio</text>
<text x="70" y="132" font-family="Inter,Segoe UI,Arial" font-size="20" fill="#cbd5e1">Notebook prototypes → engineered systems → metrics, reports, tests, and evidence</text>

<g filter="url(#shadow)">
  <rect x="70" y="190" width="235" height="210" rx="24" fill="#111827" stroke="#334155"/>
  <text x="100" y="238" font-family="Inter,Segoe UI,Arial" font-size="24" font-weight="800" fill="#f8fafc">Original Work</text>
  <text x="100" y="280" font-family="Inter,Segoe UI,Arial" font-size="17" fill="#cbd5e1">• Drone Rescue Notebook</text>
  <text x="100" y="312" font-family="Inter,Segoe UI,Arial" font-size="17" fill="#cbd5e1">• Restaurant RecoSys</text>
  <text x="100" y="344" font-family="Inter,Segoe UI,Arial" font-size="17" fill="#cbd5e1">• Docs • Academic PDFs notes</text>
</g>
<path d="M320 295 C365 295 365 295 410 295" stroke="url(#accent)" stroke-width="8" fill="none" stroke-linecap="round"/>
<polygon points="410,295 392,283 392,307" fill="#38bdf8"/>

<g filter="url(#shadow)">
  <rect x="430" y="170" width="390" height="250" rx="24" fill="#0b1220" stroke="#475569"/>
  <text x="460" y="222" font-family="Inter,Segoe UI,Arial" font-size="26" font-weight="800" fill="#f8fafc">Engineering Conversion</text>
  <rect x="462" y="252" width="138" height="42" rx="14" fill="#1e293b" stroke="#38bdf8" opacity="0.95"/>
  <text x="482" y="279" font-family="Inter,Segoe UI,Arial" font-size="15" fill="#e0f2fe">Source Code</text>
  <rect x="622" y="252" width="138" height="42" rx="14" fill="#1e293b" stroke="#a78bfa" opacity="0.95"/>
  <text x="646" y="279" font-family="Inter,Segoe UI,Arial" font-size="15" fill="#ede9fe">Test Suites</text>
  <rect x="462" y="315" width="138" height="42" rx="14" fill="#1e293b" stroke="#22c55e" opacity="0.95"/>
  <text x="489" y="342" font-family="Inter,Segoe UI,Arial" font-size="15" fill="#dcfce7">Metrics</text>
  <rect x="622" y="315" width="138" height="42" rx="14" fill="#1e293b" stroke="#f59e0b" opacity="0.95"/>
  <text x="646" y="342" font-family="Inter,Segoe UI,Arial" font-size="15" fill="#fef3c7">Reports</text>
  <text x="462" y="390" font-family="Inter,Segoe UI,Arial" font-size="16" fill="#cbd5e1">Clean modules, reproducible scripts, plots, logs, notebooks.</text>
</g>
<path d="M835 295 C880 295 880 295 925 295" stroke="url(#accent)" stroke-width="8" fill="none" stroke-linecap="round"/>
<polygon points="925,295 907,283 907,307" fill="#a78bfa"/>

<g filter="url(#shadow)">
  <rect x="945" y="150" width="245" height="280" rx="24" fill="#111827" stroke="#334155"/>
  <text x="975" y="202" font-family="Inter,Segoe UI,Arial" font-size="24" font-weight="800" fill="#f8fafc">Evidence</text>
  <text x="975" y="248" font-family="Inter,Segoe UI,Arial" font-size="17" fill="#cbd5e1">✓ Fully run outputs</text>
  <text x="975" y="284" font-family="Inter,Segoe UI,Arial" font-size="17" fill="#cbd5e1">✓ Visual evidence</text>
  <text x="975" y="320" font-family="Inter,Segoe UI,Arial" font-size="17" fill="#cbd5e1">✓ Run verification</text>
  <text x="975" y="356" font-family="Inter,Segoe UI,Arial" font-size="17" fill="#cbd5e1">✓ Resume bullets</text>
  <text x="975" y="392" font-family="Inter,Segoe UI,Arial" font-size="17" fill="#cbd5e1">✓ GitHub Pages</text>
</g>
<rect x="70" y="468" width="1090" height="2" rx="1" fill="url(#accent)" opacity="0.55"/>
<text x="70" y="505" font-family="Inter,Segoe UI,Arial" font-size="18" fill="#cbd5e1">Built to show modeling ability + engineering discipline, not just notebook execution.</text>
</svg>